name: CI

on:
  push:
    branches: [main, "build/**"]
  pull_request:

jobs:
  library:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,report,hdf5]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy --strict)
        run: mypy dielectric
      - name: Test (pytest + coverage)
        run: pytest --cov=dielectric --cov-report=term-missing --cov-fail-under=85

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,report,hdf5,web]"
      - name: Type-check backend (mypy --strict)
        run: mypy backend/app
      - name: Test backend (pytest)
        run: pytest backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Build (tsc + vite)
        run: npm run build
