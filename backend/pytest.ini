[pytest]
# Make the repo root importable (so `import backend` works) regardless of how pytest is invoked
# — pythonpath is resolved relative to the rootdir (this file's directory, backend/).
pythonpath = ..
# The library raises UserWarning on suspect data (sign convention, band limits); the backend
# suppresses/surfaces these itself, so don't promote them to errors in API tests.
filterwarnings = default
addopts = -q
