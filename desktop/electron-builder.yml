appId: com.dielectric.app
productName: Dielectric Spectroscopy
directories:
  output: release
  buildResources: build

# Inside the asar: the Electron shell + the built renderer.
files:
  - electron/dist/**
  - renderer/**

# The PyInstaller backend is bundled UNPACKED next to the app (binaries must live on the
# real filesystem to be spawnable). Staged into desktop/resources/ by `npm run stage:backend`.
extraResources:
  - from: resources/dielectric-server
    to: server
    filter: ["**/*"]

mac:
  # arch must match the PyInstaller backend, which freezes for the HOST arch only —
  # a single host cannot produce a correct x64 backend from arm64 (or vice versa).
  # arm64 here is the default for `dist:mac`; the Intel dmg comes from `dist:mac:x64`
  # (`electron-builder --mac dmg --x64`) on the macos-15-intel CI runner — NAMING the
  # target on the CLI is what makes electron-builder ignore this target/arch list
  # (a bare --x64 would not override it).
  target:
    - target: dmg
      arch: [arm64]
  # Explicit so BOTH dmgs carry the arch suffix (the default omits it for x64).
  artifactName: "${productName}-${version}-${arch}.${ext}"
  category: public.app-category.education
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
